<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Module</title><link rel="stylesheet" href="css/styles.css"></head><body>
<header><strong>Module Player</strong><nav><a href="dashboard.html">Dashboard</a> | <a href="#" id="logoutLink">Logout</a></nav></header><main id="app"></main>
<script src="js/config.js"></script><script src="js/storage.js"></script><script src="js/auth.js"></script><script src="js/api.js"></script><script src="js/modules.js"></script><script src="js/video-tracker.js"></script><script>
const user = Auth.requireAuth('student');
if (user) {
  logoutLink.onclick=e=>{e.preventDefault();Auth.logout();};
  const id = Number(new URLSearchParams(location.search).get('id'));
  const module = MODULES.find(m=>m.id===id);
  if (!module) app.innerHTML='<div class="card">Invalid module.</div>';
  else if (!user.paid) app.innerHTML='<div class="card">Payment required.</div>';
  else if (!Modules.isModuleUnlocked(user.id,id)) app.innerHTML='<div class="card">Module locked.</div>';
  else VideoTracker.mount(app,user.id,module);
}
</script></body></html>
