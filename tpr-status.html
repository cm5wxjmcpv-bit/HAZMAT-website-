<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>TPR Status</title><link rel="stylesheet" href="css/styles.css"></head><body>
<header><strong>TPR Status</strong><nav><a href="dashboard.html">Dashboard</a> | <a href="#" id="logoutLink">Logout</a></nav></header><main id="app"></main>
<script src="js/config.js"></script><script src="js/storage.js"></script><script src="js/auth.js"></script><script src="js/api.js"></script><script>
const user=Auth.requireAuth('student'); if(user){logoutLink.onclick=e=>{e.preventDefault();Auth.logout();};
const row=Api.getTprQueueRecord(user.id); if(!row){app.innerHTML='<div class="card">No TPR queue record yet.</div>';} else {
app.innerHTML=`<div class="card"><h1>TPR Submission Status</h1><p>Status: <span class="badge status-${row.status}">${row.status}</span></p><p>Due Date: ${new Date(row.dueDate).toLocaleString()}</p><p>Submitted At: ${row.submittedAt?new Date(row.submittedAt).toLocaleString():'Not submitted'}</p><p>Confirmation: ${row.tprConfirmation||'-'}</p><p>Rejection Reason: ${row.rejectionReason||'-'}</p><p class="notice">Only the provider submits to FMCSA TPR. This page shows internal status only.</p></div>`;}}
</script></body></html>
