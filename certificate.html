<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Certificate</title><link rel="stylesheet" href="css/styles.css"></head><body>
<header><strong>Certificate</strong><nav><a href="dashboard.html">Dashboard</a> | <a href="#" id="logoutLink">Logout</a></nav></header><main id="app"></main>
<script src="js/config.js"></script><script src="js/storage.js"></script><script src="js/auth.js"></script><script src="js/api.js"></script><script>
const user=Auth.requireAuth('student'); if(user){logoutLink.onclick=e=>{e.preventDefault();Auth.logout();};
const cert=Api.getCertificate(user.id); if(!cert){app.innerHTML='<div class="card">Certificate not available yet.</div>';} else {
app.innerHTML=`<div class="card"><h1>Certificate of Completion</h1><p><strong>Provider:</strong> ${cert.providerName}</p><p><strong>Provider TPR ID:</strong> ${cert.providerTprId}</p><p><strong>Student Name:</strong> ${cert.studentName}</p><p><strong>CDL/CLP Number:</strong> ${cert.cdlOrClpNumber}</p><p><strong>License State:</strong> ${cert.licenseState}</p><p><strong>Training Type:</strong> ${cert.trainingType}</p><p><strong>Completion Date:</strong> ${new Date(cert.completionDate).toLocaleDateString()}</p><p><strong>Certificate ID:</strong> ${cert.certificateId}</p><button class="no-print" onclick="window.print()">Print / Download PDF</button></div>`;}}
</script></body></html>
